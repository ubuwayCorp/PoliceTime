function resolveCollision(car,other){const cb=car.getBoundingBox(),ob=other.getBoundingBox();if(!cb.intersectsBox(ob))return false;const ox=Math.min(cb.max.x,ob.max.x)-Math.max(cb.min.x,ob.min.x),oz=Math.min(cb.max.z,ob.max.z)-Math.max(cb.min.z,ob.min.z);if(ox<oz){const p=ox/2+0.05;if(car.x<other.x){car.x-=p;other.x+=p}else{car.x+=p;other.x-=p}}else{const p=oz/2+0.05;if(car.z<other.z){car.z-=p;other.z+=p}else{car.z+=p;other.z-=p}}car.group.position.x=car.x;car.group.position.z=car.z;other.group.position.x=other.x;other.group.position.z=other.z;return true}

// ==================== ИНИЦИАЛИЗАЦИЯ ====================
const scene=new THREE.Scene();scene.background=new THREE.Color(0x87CEEB);scene.fog=new THREE.Fog(CFG.fogColor,CFG.fogNear,CFG.fogFar);
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,600);
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.25;renderer.setPixelRatio(Math.min(devicePixelRatio,2));document.body.appendChild(renderer.domElement);
const ambient=new THREE.AmbientLight(0xffffff,0.65);scene.add(ambient);
const sun=new THREE.DirectionalLight(0xfff5e0,1.5);sun.position.set(50,70,40);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.left=-80;sun.shadow.camera.right=80;sun.shadow.camera.top=80;sun.shadow.camera.bottom=-80;sun.shadow.bias=-0.0002;scene.add(sun);
const sunTarget=new THREE.Object3D();scene.add(sunTarget);sun.target=sunTarget;
const skyGeo=new THREE.SphereGeometry(450,32,32);const skyMat=new THREE.ShaderMaterial({uniforms:{topColor:{value:new THREE.Color(0x7BA8C8)},bottomColor:{value:new THREE.Color(0xD8E8F0)}},vertexShader:`varying vec3 vWorldPosition;void main(){vWorldPosition=(modelMatrix*vec4(position,1.0)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,fragmentShader:`uniform vec3 topColor;uniform vec3 bottomColor;varying vec3 vWorldPosition;void main(){float h=normalize(vWorldPosition).y;gl_FragColor=vec4(mix(bottomColor,topColor,max(h,0.0)),1.0);}`,side:THREE.BackSide});const sky=new THREE.Mesh(skyGeo,skyMat);scene.add(sky);
const cloudTex=(()=>{const c=document.createElement('canvas');c.width=64;c.height=64;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(32,32,20,0,Math.PI*2);ctx.fill();return new THREE.CanvasTexture(c)})();
for(let i=0;i<15;i++){const cloud=new THREE.Mesh(new THREE.PlaneGeometry(30,15),new THREE.MeshStandardMaterial({map:cloudTex,transparent:true,opacity:0.7,side:THREE.DoubleSide}));cloud.position.set(Utils.rand(-200,200),60+Utils.rand(-10,30),Utils.rand(-300,100));cloud.rotation.y=Math.random()*Math.PI;scene.add(cloud)}
const scratchSystem=new Scratch(scene);const car=new Rover_400(scene,scratchSystem);const world=new CityWorld(scene);world.init(car);
const Input={gas:false,brake:false,left:false,right:false};
const setupBtn=(id,action)=>{const el=document.getElementById(id);if(!el)return;const start=e=>{e.preventDefault();Input[action]=true;el.classList.add('active')};const end=e=>{e.preventDefault();Input[action]=false;el.classList.remove('active')};el.addEventListener('touchstart',start,{passive:false});el.addEventListener('touchend',end);el.addEventListener('touchcancel',end);el.addEventListener('pointerdown',start);el.addEventListener('pointerup',end);el.addEventListener('pointerleave',end)};
setupBtn('btn-left','left');setupBtn('btn-right','right');setupBtn('pedal-gas','gas');setupBtn('pedal-brake','brake');
document.getElementById('siren-btn').onclick=e=>{e.stopPropagation();sirenActive=!sirenActive;document.getElementById('siren-btn').classList.toggle('active',sirenActive)};
document.getElementById('restart-btn').onclick=()=>{car.reset();world.trafficCars.forEach(tc=>tc.dispose());world.trafficCars=[];accidentZones=[];missionActive=false;missionTarget=null;missionTimer=0;escortMissionActive=false;document.getElementById('mission-panel').classList.remove('active');document.getElementById('success-panel').classList.remove('active');document.getElementById('escort-offer').classList.remove('active');world.init(car);MusicPlayer.playOrdinary()};
document.getElementById('next-mission-btn').onclick=()=>{document.getElementById('success-panel').classList.remove('active');missionTimer=0;world.spawnBandit()};
document.getElementById('escort-accept').onclick=()=>{document.getElementById('escort-offer').classList.remove('active');escortMissionActive=true;MusicPlayer.playPursuit();setTimeout(()=>{if(escortMissionActive){escortMissionActive=false;totalDamage=Math.max(0,totalDamage-30);updateDamageUI();banditsCaught++;document.getElementById('bandit-counter').classList.add('active');document.getElementById('bandit-counter').textContent=`🚔 Бандитов: ${banditsCaught}`;document.getElementById('success-panel').classList.add('active');MusicPlayer.playOrdinary()}},45000)};
document.getElementById('escort-decline').onclick=()=>{document.getElementById('escort-offer').classList.remove('active');escortRejectedUntil=performance.now()+600000};
window.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='w'||k==='arrowup')Input.gas=true;if(k==='s'||k==='arrowdown')Input.brake=true;if(k==='a'||k==='arrowleft')Input.left=true;if(k==='d'||k==='arrowright')Input.right=true;if(k==='r')document.getElementById('restart-btn').click();if(k==='l'){sirenActive=!sirenActive;document.getElementById('siren-btn').classList.toggle('active',sirenActive)}});
window.addEventListener('keyup',e=>{const k=e.key.toLowerCase();if(k==='w'||k==='arrowup')Input.gas=false;if(k==='s'||k==='arrowdown')Input.brake=false;if(k==='a'||k==='arrowleft')Input.left=false;if(k==='d'||k==='arrowright')Input.right=false});
function updateDamageUI(){const val=document.getElementById('damage-val');const percent=Math.round(Utils.clamp(totalDamage,0,100));val.textContent=percent+'%';val.style.color=percent<30?'#00ff88':percent<70?'#ffcc00':'#ff4444';if(percent>=100&&!gameOver)car.explode()}
function addDamage(amount){if(gameOver)return;totalDamage=Utils.clamp(totalDamage+amount,0,100);updateDamageUI()}
const particlePool=new ObjectPool(()=>new Particle(scene),(o,...a)=>o.init(...a),CFG.particleMaxCount);car.explosion.particlePool=particlePool;
car.checkCollision=function(tc){if(gameOver)return;for(const t of tc){if(t.isStopped)continue;if(resolveCollision(this,t)){const rs=Math.abs(this.speed-t.speed);const f=Utils.clamp(rs*0.22,0,CFG.crashForceMax);const id=new THREE.Vector3(this.x-t.x,0.3,this.z-t.z).normalize();this.applyCrash(f,id,t.group.position.clone());this.speed*=0.7;t.speed*=0.6;world.addAccidentZone(t.x,t.z)}}if(Math.abs(this.x)>CFG.roadRight-1.4||Math.abs(this.x)<CFG.roadLeft+1.4){if(Math.abs(this.speed)>3){const side=this.x>0?1:-1;this.applyCrash(0.12,new THREE.Vector3(-side,0,0),new THREE.Vector3(this.x+side*0.9,0.4,this.z),true)}}};
let lastTime=performance.now();
function animate(now){requestAnimationFrame(animate);let dt=(now-lastTime)/1000;lastTime=now;dt=Math.min(dt,0.05);if(slowMoTimer>0){slowMoTimer-=dt;slowMo=0.25+(1-slowMoTimer/1.2)*0.75}else slowMo=1;const dtScaled=dt*slowMo;updateWeather(dtScaled,scene,sun,ambient,skyMat);car.update(dtScaled,Input);world.update();car.checkCollision(world.trafficCars);particlePool.updateAll(dtScaled,(p,dt)=>p.update(dt));const camOffset=new THREE.Vector3(0,CFG.cameraHeight,CFG.cameraDistance);camOffset.applyAxisAngle(new THREE.Vector3(0,1,0),car.angle);const targetCamPos=car.group.position.clone().add(camOffset);targetCamPos.y+=Math.abs(car.speed)*0.015;camera.position.lerp(targetCamPos,CFG.cameraFollowLerp);if(cameraShake>0){camera.position.x+=Utils.rand(-1,1)*cameraShake*0.3;camera.position.y+=Utils.rand(-1,1)*cameraShake*0.2;cameraShake*=0.85}const lookAtPos=car.group.position.clone().add(new THREE.Vector3(0,1.25,-CFG.cameraLookAhead));camera.lookAt(lookAtPos);sunTarget.position.set(car.x,0,car.z);sun.position.set(car.x+50,70,car.z+40);sky.position.copy(camera.position);document.getElementById('speedo').innerHTML=`${car.getSpeedKMH()}<span>KM/H</span>`;renderer.render(scene,camera)}
updateDamageUI();animate(performance.now());
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
document.addEventListener('gesturestart',e=>e.preventDefault());document.addEventListener('gesturechange',e=>e.preventDefault());
</script>
